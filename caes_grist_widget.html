<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord CAES</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    :root {
      --bleu:   #1a3a5c;
      --vert:   #2a7a4b;
      --orange: #b45309;
      --rouge:  #b91c1c;
      --gris0:  #f5f6f8;
      --gris1:  #e8eaed;
      --gris2:  #c8cdd5;
      --gris3:  #6b7280;
      --texte:  #1f2937;
      --blanc:  #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gris0);
      color: var(--texte);
      font-size: 13px;
      padding: 16px;
    }

    header {
      background: var(--bleu);
      color: var(--blanc);
      padding: 12px 18px;
      border-radius: 8px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo { font-size: 15px; font-weight: 700; }
    header .sub  { font-size: 11px; opacity: 0.65; margin-top: 2px; }
    header .badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .waiting {
      text-align: center;
      padding: 60px 20px;
      color: var(--gris3);
    }
    .waiting .icon { font-size: 40px; margin-bottom: 12px; }

    /* KPIs */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .kpi {
      background: var(--blanc);
      border: 1px solid var(--gris1);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }
    .kpi .val { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .kpi .lbl { font-size: 11px; color: var(--gris3); font-weight: 600; }
    .kpi.bleu   .val { color: var(--bleu); }
    .kpi.vert   .val { color: var(--vert); }
    .kpi.rouge  .val { color: var(--rouge); }
    .kpi.orange .val { color: var(--orange); }

    /* Tableaux */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--bleu);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin: 20px 0 10px;
      padding-left: 4px;
      border-left: 3px solid var(--bleu);
    }
    .tables-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .table-card {
      background: var(--blanc);
      border: 1px solid var(--gris1);
      border-radius: 8px;
      overflow: hidden;
    }
    .table-card.full { grid-column: 1 / -1; }
    .table-card .thead {
      background: var(--bleu);
      color: var(--blanc);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--gris0);
      font-size: 11px;
      font-weight: 700;
      color: var(--gris3);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 7px 12px;
      text-align: left;
      border-bottom: 1px solid var(--gris1);
    }
    td {
      padding: 7px 12px;
      font-size: 12px;
      border-bottom: 1px solid var(--gris1);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gris0); }

    .bar-wrap {
      background: var(--gris1);
      border-radius: 4px;
      height: 6px;
      width: 80px;
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--bleu);
    }

    /* Synthèse */
    .card {
      background: var(--blanc);
      border: 1px solid var(--gris1);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .card .card-head {
      background: var(--bleu);
      color: var(--blanc);
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
    }
    .card .card-body { padding: 16px; line-height: 1.75; }
    .card .card-body h4 {
      font-size: 12px;
      font-weight: 700;
      color: var(--bleu);
      margin: 12px 0 4px;
    }
    .card .card-body h4:first-child { margin-top: 0; }
    .card .card-body p { margin-bottom: 6px; }
    .card .card-body ul { padding-left: 18px; margin-bottom: 6px; }
    .card .card-body li { margin-bottom: 3px; }

    /* Scénarios */
    .scenarios-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .scenario-card {
      background: var(--blanc);
      border: 1px solid var(--gris1);
      border-radius: 8px;
      overflow: hidden;
    }
    .scenario-card .sc-head {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--blanc);
    }
    .scenario-card .sc-body {
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.65;
    }
    .scenario-card .sc-body h5 {
      font-size: 11px;
      font-weight: 700;
      color: var(--gris3);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin: 8px 0 3px;
    }
    .scenario-card .sc-body h5:first-child { margin-top: 0; }
    .scenario-card .sc-body ul { padding-left: 16px; }
    .scenario-card .sc-body li { margin-bottom: 2px; }

    @media (max-width: 600px) {
      .kpi-row, .tables-grid, .scenarios-grid { grid-template-columns: 1fr 1fr; }
      .table-card.full { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Tableau de bord CAES</div>
    <div class="sub">Candidats accompagnés — SAIO Bordeaux</div>
  </div>
  <div class="badge">Analyse automatique</div>
</header>

<div id="waiting" class="waiting">
  <div class="icon">📊</div>
  <p>En attente des données Grist…<br>Connexion à <strong>Candidats_accompagnes</strong>.</p>
</div>

<div id="app" style="display:none"></div>

<script>
grist.ready({
  requiredAccess: 'read table',
  columns: [
    {name:'N_dossier',        type:'Text'},
    {name:'Nom',              type:'Text'},
    {name:'Prenom',           type:'Text'},
    {name:'Date_demande',     type:'Date'},
    {name:'Lycee',            type:'Text'},
    {name:'Classe',           type:'Text'},
    {name:'Type_Bac',         type:'Text'},
    {name:'Serie_Bac',        type:'Text'},
    {name:'Domaine',          type:'Text'},
    {name:'Motif_CAES',       type:'Text'},
    {name:'Derogatoire',      type:'Text'},
    {name:'Hors_delai_PC',    type:'Text'},
    {name:'Etat_demande',     type:'Text'},
    {name:'Statut_traitement',type:'Text'},
    {name:'Formation',        type:'Text'},
    {name:'Suivi_par',        type:'Text'},
    {name:'Alerte',           type:'Text'}
  ]
});

grist.onRecords(function(records) {
  if (!records || !records.length) return;
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render(records);
});

// ── Utilitaires ──────────────────────────────────────────────────
function v(row, key) {
  const val = row[key];
  return (val !== undefined && val !== null && val !== '') ? String(val) : '';
}

function countBy(records, key) {
  const c = {};
  records.forEach(r => { const k = v(r,key)||'Non renseigné'; c[k]=(c[k]||0)+1; });
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}

function isOui(val) {
  return ['oui','Oui','OUI','true','1','yes'].includes(String(val).trim());
}

function pct(n, total) { return total ? Math.round(n/total*100) : 0; }

// ── Tableaux ─────────────────────────────────────────────────────
function makeTable(title, entries, total, full) {
  const cls = full ? 'table-card full' : 'table-card';
  let rows = '';
  entries.forEach(([k,n]) => {
    const p = pct(n,total);
    rows += `<tr>
      <td>${k}</td>
      <td><strong>${n}</strong></td>
      <td>${p}%<span class="bar-wrap"><span class="bar-fill" style="width:${p}%"></span></span></td>
    </tr>`;
  });
  return `<div class="${cls}">
    <div class="thead">${title}</div>
    <table><thead><tr><th>Valeur</th><th>Nb</th><th>%</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>`;
}

// ── Synthèse narrative ───────────────────────────────────────────
function buildSynthese(records) {
  const total     = records.length;
  const fav       = records.filter(r => /favor/i.test(v(r,'Etat_demande'))).length;
  const def       = records.filter(r => /favor/i.test(v(r,'Etat_demande')) === false && /fav|accord/i.test(v(r,'Etat_demande')) === false && /refus|défav|defav/i.test(v(r,'Etat_demande'))).length;
  const hdl       = records.filter(r => isOui(v(r,'Hors_delai_PC'))).length;
  const deroga    = records.filter(r => isOui(v(r,'Derogatoire'))).length;
  const alertes   = records.filter(r => v(r,'Alerte') !== '').length;
  const motifs    = countBy(records,'Motif_CAES').slice(0,3);
  const domaines  = countBy(records,'Domaine').slice(0,2);
  const formations= countBy(records,'Formation').slice(0,2);

  const motifsTxt    = motifs.map(([k,n])=>`<strong>${k}</strong> (${n})`).join(', ');
  const domainesTxt  = domaines.map(([k,n])=>`<strong>${k}</strong> (${n})`).join(' et ');
  const formationsTxt= formations.map(([k,n])=>`<strong>${k}</strong> (${n})`).join(' et ');

  return `<div class="card">
    <div class="card-head">📋 Synthèse de la situation</div>
    <div class="card-body">
      <h4>Volume et nature des demandes</h4>
      <p>La commission a reçu <strong>${total} dossiers</strong> au total.
      Parmi eux, <strong>${deroga} sont dérogatoires</strong> (${pct(deroga,total)}%)
      et <strong>${hdl} sont hors délai Parcoursup</strong> (${pct(hdl,total)}%).
      ${alertes > 0 ? `<strong>${alertes} dossier${alertes>1?'s':''} présentent une alerte</strong> nécessitant une attention particulière.` : 'Aucune alerte particulière n\'est signalée.'}</p>

      <h4>Motifs dominants</h4>
      <p>Les trois motifs les plus fréquents sont : ${motifsTxt}.
      Ils représentent ${pct(motifs.reduce((s,[,n])=>s+n,0),total)}% de l'ensemble des demandes.</p>

      <h4>État de traitement</h4>
      <p><strong>${fav} dossiers sont favorables</strong> (${pct(fav,total)}%),
      <strong>${def} défavorables</strong> (${pct(def,total)}%).
      Les dossiers restants sont en attente ou en cours de traitement.</p>

      <h4>Formations et domaines sollicités</h4>
      <p>Les domaines les plus représentés sont ${domainesTxt}.
      Les formations les plus demandées sont ${formationsTxt}.</p>

      <h4>Points de vigilance</h4>
      <ul>
        ${hdl > 0 ? `<li>${hdl} dossier${hdl>1?'s':''} hors délai PC (${pct(hdl,total)}%) — à traiter en priorité.</li>` : ''}
        ${deroga > 0 ? `<li>${deroga} dossier${deroga>1?'s':''} dérogatoires nécessitant un examen individualisé.</li>` : ''}
        ${alertes > 0 ? `<li>${alertes} alerte${alertes>1?'s':''} signalée${alertes>1?'s':''} à lever avant la commission.</li>` : ''}
        <li>Vérifier la cohérence entre formation demandée et domaine pour les dossiers incomplets.</li>
      </ul>
    </div>
  </div>`;
}

// ── Scénarios prospectifs ─────────────────────────────────────────
function buildScenarios(records) {
  const total   = records.length;
  const hdl     = records.filter(r => isOui(v(r,'Hors_delai_PC'))).length;
  const deroga  = records.filter(r => isOui(v(r,'Derogatoire'))).length;
  const fav     = records.filter(r => /favor/i.test(v(r,'Etat_demande'))).length;
  const motifs  = countBy(records,'Motif_CAES').slice(0,2).map(([k])=>k);
  const pHdl    = pct(hdl,total);
  const pFav    = pct(fav,total);

  return `<div class="section-title">🔭 Scénarios prospectifs</div>
  <div class="scenarios-grid">

    <div class="scenario-card">
      <div class="sc-head" style="background:var(--vert)">Scénario 1 — Traitement accéléré</div>
      <div class="sc-body">
        <h5>Hypothèse</h5>
        <p>La commission priorise les ${hdl} dossiers hors délai (${pHdl}%) et les ${deroga} dérogatoires pour un traitement en urgence.</p>
        <h5>Impact</h5>
        <p>Taux de dossiers traités dans les délais porté à 95%+. Réduction du risque contentieux.</p>
        <h5>Actions</h5>
        <ul>
          <li>Session de traitement dédiée aux dossiers hors délai</li>
          <li>Binôme instructeur pour les cas dérogatoires</li>
          <li>Relance des lycées concernés sous 48h</li>
        </ul>
        <h5>Indicateur cible</h5>
        <p>0 dossier hors délai non traité avant la commission.</p>
      </div>
    </div>

    <div class="scenario-card">
      <div class="sc-head" style="background:var(--orange)">Scénario 2 — Consolidation des motifs dominants</div>
      <div class="sc-body">
        <h5>Hypothèse</h5>
        <p>Les motifs <strong>${motifs[0]||'principaux'}</strong> et <strong>${motifs[1]||'secondaires'}</strong> concentrent les décisions — la commission harmonise sa doctrine sur ces cas.</p>
        <h5>Impact</h5>
        <p>Cohérence des avis renforcée, réduction des recours. Gain de temps estimé : 20% sur les instructions répétitives.</p>
        <h5>Actions</h5>
        <ul>
          <li>Grille d'instruction commune pour les motifs récurrents</li>
          <li>Référentiel de décision partagé entre instructeurs</li>
          <li>Point hebdomadaire sur les cas limites</li>
        </ul>
        <h5>Indicateur cible</h5>
        <p>Taux de cohérence des avis ≥ 90% sur les motifs dominants.</p>
      </div>
    </div>

    <div class="scenario-card">
      <div class="sc-head" style="background:var(--rouge)">Scénario 3 — Afflux supplémentaire</div>
      <div class="sc-body">
        <h5>Hypothèse</h5>
        <p>Le volume de dossiers augmente de 30% (tendance constatée sur les dernières sessions). La capacité de traitement actuelle atteint ses limites.</p>
        <h5>Impact</h5>
        <p>Risque de dépassement des délais réglementaires. Taux favorable actuel de ${pFav}% difficile à maintenir sans renfort.</p>
        <h5>Actions</h5>
        <ul>
          <li>Anticipation des ressources humaines supplémentaires</li>
          <li>Simplification du circuit pour les dossiers non dérogatoires</li>
          <li>Communication préventive aux établissements sur les délais</li>
        </ul>
        <h5>Indicateur cible</h5>
        <p>Capacité de traitement ≥ ${Math.round(total*1.3)} dossiers sans dégradation de qualité.</p>
      </div>
    </div>

  </div>`;
}

// ── Rendu principal ───────────────────────────────────────────────
function render(records) {
  const total  = records.length;
  const fav    = records.filter(r => /favor/i.test(v(r,'Etat_demande'))).length;
  const def    = records.filter(r => /refus|défav|defav/i.test(v(r,'Etat_demande'))).length;
  const hdl    = records.filter(r => isOui(v(r,'Hors_delai_PC'))).length;

  const app = document.getElementById('app');
  app.innerHTML = '';

  // KPIs
  app.innerHTML += `<div class="kpi-row">
    <div class="kpi bleu"><div class="val">${total}</div><div class="lbl">Dossiers total</div></div>
    <div class="kpi vert"><div class="val">${fav}</div><div class="lbl">Favorables</div></div>
    <div class="kpi rouge"><div class="val">${def}</div><div class="lbl">Défavorables</div></div>
    <div class="kpi orange"><div class="val">${hdl}</div><div class="lbl">Hors délai PC</div></div>
  </div>`;

  // Tableaux récapitulatifs
  app.innerHTML += `<div class="section-title">📊 Tableaux récapitulatifs</div>`;
  const grid = document.createElement('div');
  grid.className = 'tables-grid';
  grid.innerHTML =
    makeTable('Par motif CAES',         countBy(records,'Motif_CAES'),       total, false) +
    makeTable('Par état de la demande', countBy(records,'Etat_demande'),      total, false) +
    makeTable('Par domaine',            countBy(records,'Domaine'),           total, false) +
    makeTable('Par formation',          countBy(records,'Formation'),         total, false) +
    makeTable('Dérogatoire',            countBy(records,'Derogatoire'),       total, false) +
    makeTable('Par lycée d\'origine',   countBy(records,'Lycee'),             total, false);
  app.appendChild(grid);

  // Synthèse
  app.innerHTML += buildSynthese(records);

  // Scénarios
  app.innerHTML += buildScenarios(records);
}
</script>
</body>
</html>
