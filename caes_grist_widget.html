<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyseur CAES</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root {
    --bleu:   #1a3a5c;
    --bleu2:  #2d5f8a;
    --vert:   #2a7a4b;
    --orange: #b45309;
    --rouge:  #b91c1c;
    --gris0:  #f5f6f8;
    --gris1:  #e8eaed;
    --gris2:  #c8cdd5;
    --gris3:  #6b7280;
    --texte:  #1f2937;
    --blanc:  #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--gris0);
    color: var(--texte);
    font-size: 13px;
  }

  header {
    background: var(--bleu);
    color: var(--blanc);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header .logo { font-size: 15px; font-weight: 700; }
  header .sub  { font-size: 11px; opacity: 0.65; }
  header .badge {
    margin-left: auto;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
  }

  main { padding: 16px; max-width: 100%; }

  /* État initial */
  .waiting {
    text-align: center;
    padding: 48px 20px;
    color: var(--gris3);
  }
  .waiting .icon { font-size: 40px; margin-bottom: 12px; }
  .waiting p { font-size: 13px; line-height: 1.6; }

  /* Bouton */
  .btn {
    background: var(--bleu);
    color: var(--blanc);
    border: none;
    border-radius: 6px;
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn:hover { background: var(--bleu2); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .step { font-size: 12px; color: var(--gris3); margin-top: 8px; min-height: 18px; }

  /* KPIs */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .kpi {
    background: var(--blanc);
    border: 1px solid var(--gris1);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .kpi .val { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
  .kpi .lbl { font-size: 11px; color: var(--gris3); font-weight: 600; }
  .kpi.bleu   .val { color: var(--bleu); }
  .kpi.vert   .val { color: var(--vert); }
  .kpi.orange .val { color: var(--orange); }
  .kpi.rouge  .val { color: var(--rouge); }

  /* Cards */
  .card {
    background: var(--blanc);
    border: 1px solid var(--gris1);
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .card-header {
    background: var(--bleu);
    color: var(--blanc);
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .card-body { padding: 14px 16px; }

  .synthese-text {
    line-height: 1.75;
    white-space: pre-wrap;
    color: var(--texte);
  }

  /* Tableaux */
  .tables-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .table-card {
    background: var(--blanc);
    border: 1px solid var(--gris1);
    border-radius: 8px;
    overflow: hidden;
  }
  .table-card.full { grid-column: 1 / -1; }
  .table-card .thead {
    background: var(--bleu);
    color: var(--blanc);
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 700;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: var(--gris0);
    font-size: 11px;
    font-weight: 700;
    color: var(--gris3);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding: 7px 12px;
    text-align: left;
    border-bottom: 1px solid var(--gris1);
  }
  td {
    padding: 7px 12px;
    font-size: 12px;
    border-bottom: 1px solid var(--gris1);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--gris0); }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .pill.vert   { background: #dcfce7; color: var(--vert); }
  .pill.rouge  { background: #fee2e2; color: var(--rouge); }
  .pill.orange { background: #fef3c7; color: var(--orange); }
  .pill.bleu   { background: #dbeafe; color: var(--bleu); }
  .pill.gris   { background: var(--gris1); color: var(--gris3); }

  /* Scénarios */
  .scenarios-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .scenario-card {
    background: var(--blanc);
    border: 1px solid var(--gris1);
    border-radius: 8px;
    padding: 14px;
  }
  .scenario-title {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--gris1);
  }
  .scenario-body {
    font-size: 12px;
    line-height: 1.65;
    white-space: pre-wrap;
    color: var(--texte);
  }

  .error {
    background: #fee2e2;
    border: 1px solid #fca5a5;
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--rouge);
    margin-top: 10px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  @media (max-width: 600px) {
    .kpi-row, .tables-grid, .scenarios-grid { grid-template-columns: 1fr 1fr; }
    .table-card.full { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Analyseur CAES</div>
    <div class="sub">Candidats accompagnés — SAIO Bordeaux</div>
  </div>
  <div class="badge">IA · Claude</div>
</header>

<main>
  <div id="waiting" class="waiting">
    <div class="icon">📊</div>
    <p>En attente des données Grist…<br>Le widget se connecte à la table <strong>Candidats_accompagnes</strong>.</p>
  </div>

  <div id="app" style="display:none">
    <div class="toolbar">
      <button class="btn" id="btnAnalyser" onclick="lancerAnalyse()">
        Analyser avec Claude
      </button>
      <span id="nbRows" style="font-size:12px;color:var(--gris3)"></span>
    </div>
    <div class="step" id="step"></div>
    <div class="error" id="errorMsg" style="display:none"></div>
    <div id="output"></div>
  </div>
</main>

<script>
let gristRows = [];

// ── Connexion Grist ──────────────────────────────────────────────
grist.ready({ requiredAccess: 'read table' });

grist.onRecords(records => {
  gristRows = records;
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('nbRows').textContent =
    `${records.length} dossier${records.length > 1 ? 's' : ''} chargé${records.length > 1 ? 's' : ''}`;
});

// ── Helpers ──────────────────────────────────────────────────────
function val(row, ...keys) {
  for (const k of keys) if (row[k] !== undefined && row[k] !== null && row[k] !== '') return row[k];
  return '';
}

function countBy(rows, key) {
  const counts = {};
  rows.forEach(r => {
    const v = val(r, key) || 'Non renseigné';
    counts[v] = (counts[v] || 0) + 1;
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]);
}

function buildTable(title, entries, total, full = false) {
  const cls = full ? 'table-card full' : 'table-card';
  let html = `<div class="${cls}"><div class="thead">${title}</div><table>
    <thead><tr><th>Valeur</th><th>Nb</th><th>%</th></tr></thead><tbody>`;
  entries.forEach(([k, n]) => {
    html += `<tr><td>${k}</td><td><strong>${n}</strong></td><td>${Math.round(n/total*100)}%</td></tr>`;
  });
  return html + '</tbody></table></div>';
}

function setStep(msg) {
  const el = document.getElementById('step');
  el.innerHTML = msg ? `<span class="spinner" style="display:inline-block;vertical-align:middle;margin-right:6px"></span>${msg}` : '';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}

// ── Analyse principale ───────────────────────────────────────────
async function lancerAnalyse() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('btnAnalyser').disabled = true;
  document.getElementById('output').innerHTML = '';

  const rows = gristRows;
  const total = rows.length;
  if (!total) { showError('Aucune donnée disponible.'); return; }

  // KPIs
  setStep('Calcul des indicateurs…');
  const etatOK   = rows.filter(r => ['Accepté','Accordé','Favorable'].includes(val(r,'Etat_demande'))).length;
  const etatNOK  = rows.filter(r => ['Refusé','Défavorable'].includes(val(r,'Etat_demande'))).length;
  const hdl      = rows.filter(r => ['oui','Oui','OUI','1',true].includes(val(r,'Hors_delai_PC'))).length;
  const deroga   = rows.filter(r => ['oui','Oui','OUI','1',true].includes(val(r,'Derogatoire'))).length;

  const out = document.getElementById('output');

  // KPI row
  out.innerHTML = `
    <div class="kpi-row">
      <div class="kpi bleu"><div class="val">${total}</div><div class="lbl">Dossiers total</div></div>
      <div class="kpi vert"><div class="val">${etatOK}</div><div class="lbl">Favorables</div></div>
      <div class="kpi rouge"><div class="val">${etatNOK}</div><div class="lbl">Défavorables</div></div>
      <div class="kpi orange"><div class="val">${hdl}</div><div class="lbl">Hors délai PC</div></div>
    </div>
  `;

  // Tableaux récapitulatifs
  setStep('Construction des tableaux…');
  const tablesDiv = document.createElement('div');
  tablesDiv.className = 'tables-grid';
  tablesDiv.innerHTML =
    buildTable('Par motif CAES',      countBy(rows,'Motif_CAES'),   total) +
    buildTable('Par état de demande', countBy(rows,'Etat_demande'),  total) +
    buildTable('Par domaine',         countBy(rows,'Domaine'),       total) +
    buildTable('Par formation',       countBy(rows,'Formation'),     total) +
    buildTable('Dérogatoire',         countBy(rows,'Derogatoire'),   total) +
    buildTable('Par lycée',           countBy(rows,'Lycee'),         total, false);
  out.appendChild(tablesDiv);

  // Résumé pour Claude (anonymisé, sans noms)
  const resume = rows.slice(0, 50).map(r => ({
    domaine:          val(r,'Domaine'),
    motif:            val(r,'Motif_CAES'),
    derogatoire:      val(r,'Derogatoire'),
    hors_delai:       val(r,'Hors_delai_PC'),
    etat:             val(r,'Etat_demande'),
    statut:           val(r,'Statut_traitement'),
    formation:        val(r,'Formation'),
    alerte:           val(r,'Alerte'),
  }));

  // Synthèse Claude
  setStep('Génération de la synthèse par Claude…');
  const syntheseCard = document.createElement('div');
  syntheseCard.className = 'card';
  syntheseCard.innerHTML = `<div class="card-header">📋 Synthèse de la situation</div>
    <div class="card-body"><div class="synthese-text" id="syntheseText">Analyse en cours…</div></div>`;
  out.appendChild(syntheseCard);

  try {
    const synthese = await callClaude(`Tu es expert en orientation dans l'enseignement supérieur français, spécialiste des procédures CAES (Commission d'Accès à l'Enseignement Supérieur) de Parcoursup.

Voici les données anonymisées de ${total} dossiers de la table Candidats_accompagnés du SAIO de Bordeaux :
${JSON.stringify(resume)}

Statistiques calculées :
- Dossiers favorables : ${etatOK} / ${total}
- Dossiers défavorables : ${etatNOK} / ${total}
- Hors délai PC : ${hdl} / ${total}
- Motifs dérogatoires : ${deroga} / ${total}

Rédige une synthèse professionnelle de 8 à 12 lignes couvrant :
- le volume et la nature des demandes
- les motifs dominants et leur répartition dérogatoire/non dérogatoire
- la répartition des états de traitement
- les alertes ou situations sensibles identifiées
- les formations les plus sollicitées
- les points de vigilance pour la commission

Ton professionnel, adapté à un rapport de commission académique.`);

    document.getElementById('syntheseText').textContent = synthese;
  } catch(e) { document.getElementById('syntheseText').textContent = `Erreur Claude : ${e.message}`; }

  // Scénarios Claude
  setStep('Génération des scénarios prospectifs…');
  const scenCard = document.createElement('div');
  scenCard.className = 'card';
  scenCard.innerHTML = `<div class="card-header">🔭 Scénarios prospectifs</div>
    <div class="card-body"><div id="scenContainer">Scénarios en cours…</div></div>`;
  out.appendChild(scenCard);

  try {
    const scenarios = await callClaude(`Tu es expert en orientation dans l'enseignement supérieur français, spécialiste CAES.

Données : ${total} dossiers, ${etatOK} favorables, ${etatNOK} défavorables, ${hdl} hors délai PC, ${deroga} dérogatoires.
Motifs : ${countBy(rows,'Motif_CAES').slice(0,5).map(([k,n])=>`${k}(${n})`).join(', ')}
Formations : ${countBy(rows,'Formation').slice(0,5).map(([k,n])=>`${k}(${n})`).join(', ')}

Propose exactement 3 scénarios prospectifs opérationnels pour la commission, en te basant sur ces chiffres réels.
Format strict à respecter :

SCÉNARIO 1 — [titre court]
[4 à 6 lignes : hypothèse, impact sur les places, risques, recommandation concrète]

SCÉNARIO 2 — [titre court]
[4 à 6 lignes]

SCÉNARIO 3 — [titre court]
[4 à 6 lignes]

Rien avant le premier scénario, rien après le troisième.`);

    const colors = ['bleu','orange','rouge'];
    const titles = [...scenarios.matchAll(/SCÉNARIO \d+ — (.+)/gi)].map(m => m[1].trim());
    const parts  = scenarios.split(/SCÉNARIO \d+ — [^\n]+\n?/i).filter(s => s.trim());

    const container = document.getElementById('scenContainer');
    if (parts.length >= 3) {
      container.innerHTML = '';
      const grid = document.createElement('div');
      grid.className = 'scenarios-grid';
      parts.slice(0,3).forEach((p, i) => {
        grid.innerHTML += `
          <div class="scenario-card">
            <div class="scenario-title" style="color:var(--${colors[i]})">
              Scénario ${i+1} — ${titles[i] || ''}
            </div>
            <div class="scenario-body">${p.trim()}</div>
          </div>`;
      });
      container.appendChild(grid);
    } else {
      container.textContent = scenarios;
    }
  } catch(e) { document.getElementById('scenContainer').textContent = `Erreur Claude : ${e.message}`; }

  setStep('');
  document.getElementById('btnAnalyser').disabled = false;
}

// ── Appel Claude API ─────────────────────────────────────────────
async function callClaude(prompt) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return data.content.map(b => b.text || '').join('');
}
</script>
</body>
</html>
