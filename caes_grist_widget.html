<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord CAES</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    :root {
      --bleu:   #1a3a5c;
      --bleu2:  #2d5f8a;
      --vert:   #2a7a4b;
      --orange: #b45309;
      --rouge:  #b91c1c;
      --violet: #6d28d9;
      --cyan:   #0e7490;
      --rose:   #be185d;
      --gris0:  #f5f6f8;
      --gris1:  #e8eaed;
      --gris2:  #c8cdd5;
      --gris3:  #6b7280;
      --texte:  #1f2937;
      --blanc:  #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gris0);
      color: var(--texte);
      font-size: 13px;
      padding: 16px;
    }

    header {
      background: var(--bleu);
      color: var(--blanc);
      padding: 12px 18px;
      border-radius: 8px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo { font-size: 15px; font-weight: 700; }
    header .sub  { font-size: 11px; opacity: 0.65; margin-top: 2px; }
    header .badge {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .waiting {
      text-align: center;
      padding: 60px 20px;
      color: var(--gris3);
    }
    .waiting .icon { font-size: 40px; margin-bottom: 12px; }

    /* KPIs */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .kpi {
      background: var(--blanc);
      border: 1px solid var(--gris1);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }
    .kpi .val { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .kpi .lbl { font-size: 11px; color: var(--gris3); font-weight: 600; }
    .kpi.bleu   .val { color: var(--bleu); }
    .kpi.vert   .val { color: var(--vert); }
    .kpi.rouge  .val { color: var(--rouge); }
    .kpi.orange .val { color: var(--orange); }

    /* Sections */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--bleu);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin: 22px 0 12px;
      padding-left: 8px;
      border-left: 3px solid var(--bleu);
    }

    /* Grille camembert + tableau */
    .chart-block {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
      background: var(--blanc);
      border: 1px solid var(--gris1);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .chart-block.wide { grid-template-columns: 180px 1fr; }

    .pie-side {
      background: var(--gris0);
      border-right: 1px solid var(--gris1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 12px;
      gap: 10px;
    }
    .pie-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--bleu);
      text-align: center;
    }
    .pie-legend { width: 100%; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--texte);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .legend-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .table-side { overflow-x: auto; }
    .table-head {
      background: var(--bleu);
      color: var(--blanc);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--gris0);
      font-size: 11px;
      font-weight: 700;
      color: var(--gris3);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 7px 12px;
      text-align: left;
      border-bottom: 1px solid var(--gris1);
    }
    td {
      padding: 7px 12px;
      font-size: 12px;
      border-bottom: 1px solid var(--gris1);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gris0); }

    .bar-wrap {
      background: var(--gris1);
      border-radius: 4px;
      height: 6px;
      width: 70px;
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
    }
    .bar-fill { height: 100%; border-radius: 4px; }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    /* Synthèse */
    .card {
      background: var(--blanc);
      border: 1px solid var(--gris1);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .card .card-head {
      background: var(--bleu);
      color: var(--blanc);
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
    }
    .card .card-body { padding: 16px; line-height: 1.75; }
    .card .card-body h4 {
      font-size: 12px;
      font-weight: 700;
      color: var(--bleu);
      margin: 12px 0 4px;
    }
    .card .card-body h4:first-child { margin-top: 0; }
    .card .card-body p { margin-bottom: 6px; }
    .card .card-body ul { padding-left: 18px; margin-bottom: 6px; }
    .card .card-body li { margin-bottom: 3px; }

    /* Scénarios */
    .scenarios-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }
    .scenario-card {
      background: var(--blanc);
      border: 1px solid var(--gris1);
      border-radius: 8px;
      overflow: hidden;
    }
    .scenario-card .sc-head {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--blanc);
    }
    .scenario-card .sc-body {
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.65;
    }
    .scenario-card .sc-body h5 {
      font-size: 11px;
      font-weight: 700;
      color: var(--gris3);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin: 8px 0 3px;
    }
    .scenario-card .sc-body h5:first-child { margin-top: 0; }
    .scenario-card .sc-body ul { padding-left: 16px; }
    .scenario-card .sc-body li { margin-bottom: 2px; }

    @media (max-width: 640px) {
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .chart-block { grid-template-columns: 1fr; }
      .pie-side { border-right: none; border-bottom: 1px solid var(--gris1); }
      .scenarios-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Tableau de bord CAES</div>
    <div class="sub">Candidats accompagnés — SAIO Bordeaux</div>
  </div>
  <div class="badge">Analyse automatique</div>
</header>

<div id="waiting" class="waiting">
  <div class="icon">📊</div>
  <p>En attente des données Grist…<br>Connexion à <strong>Candidats_accompagnes</strong>.</p>
</div>

<div id="app" style="display:none"></div>

<script>
// ── Palette de couleurs pour les camemberts ──────────────────────
const COLORS = [
  '#1a3a5c','#2a7a4b','#b45309','#b91c1c','#6d28d9',
  '#0e7490','#be185d','#065f46','#92400e','#1e40af',
  '#7c3aed','#047857','#b45309','#dc2626','#4338ca'
];

grist.ready({
  requiredAccess: 'read table',
  columns: [
    {name:'N_dossier',        type:'Text'},
    {name:'Nom',              type:'Text'},
    {name:'Prenom',           type:'Text'},
    {name:'Date_demande',     type:'Date'},
    {name:'Lycee',            type:'Text'},
    {name:'Classe',           type:'Text'},
    {name:'Type_Bac',         type:'Text'},
    {name:'Serie_Bac',        type:'Text'},
    {name:'Domaine',          type:'Text'},
    {name:'Motif_CAES',       type:'Text'},
    {name:'Derogatoire',      type:'Text'},
    {name:'Hors_delai_PC',    type:'Text'},
    {name:'Etat_demande',     type:'Text'},
    {name:'Statut_traitement',type:'Text'},
    {name:'Formation',        type:'Text'},
    {name:'Suivi_par',        type:'Text'},
    {name:'Alerte',           type:'Text'}
  ]
});

grist.onRecords(function(records) {
  if (!records || !records.length) return;
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render(records);
});

// ── Utilitaires ──────────────────────────────────────────────────
function v(row, key) {
  const val = row[key];
  return (val !== undefined && val !== null && val !== '') ? String(val) : '';
}
function countBy(records, key) {
  const c = {};
  records.forEach(r => { const k = v(r,key)||'Non renseigné'; c[k]=(c[k]||0)+1; });
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}
function isOui(val) {
  return ['oui','Oui','OUI','true','1','yes'].includes(String(val).trim());
}
function pct(n, total) { return total ? Math.round(n/total*100) : 0; }

// ── Camembert SVG ────────────────────────────────────────────────
function makePie(entries, total, size) {
  size = size || 120;
  const cx = size/2, cy = size/2, r = size/2 - 4;
  if (!total) return `<svg width="${size}" height="${size}"></svg>`;

  let paths = '';
  let angle = -Math.PI / 2;

  entries.forEach(([, n], i) => {
    if (!n) return;
    const slice = (n / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle);
    const y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(angle + slice);
    const y2 = cy + r * Math.sin(angle + slice);
    const large = slice > Math.PI ? 1 : 0;
    const color = COLORS[i % COLORS.length];

    paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z"
      fill="${color}" stroke="white" stroke-width="1.5"/>`;
    angle += slice;
  });

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}

// ── Bloc camembert + tableau ─────────────────────────────────────
function makeChartBlock(title, entries, total, colorOffset) {
  colorOffset = colorOffset || 0;
  const topEntries = entries.slice(0, 10);

  // Légende (5 max pour la lisibilité)
  let legend = '';
  topEntries.slice(0, 6).forEach(([k, n], i) => {
    const color = COLORS[(i + colorOffset) % COLORS.length];
    const label = k.length > 22 ? k.slice(0, 20) + '…' : k;
    legend += `<div class="legend-item">
      <span class="legend-dot" style="background:${color}"></span>
      <span>${label} <strong>(${pct(n,total)}%)</strong></span>
    </div>`;
  });

  // Lignes tableau
  let rows = '';
  topEntries.forEach(([k, n], i) => {
    const p = pct(n, total);
    const color = COLORS[(i + colorOffset) % COLORS.length];
    rows += `<tr>
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:6px;vertical-align:middle"></span>${k}</td>
      <td><strong>${n}</strong></td>
      <td>${p}%<span class="bar-wrap"><span class="bar-fill" style="width:${p}%;background:${color}"></span></span></td>
    </tr>`;
  });

  return `<div class="chart-block">
    <div class="pie-side">
      <div class="pie-title">${title}</div>
      ${makePie(topEntries, total, 130)}
      <div class="pie-legend">${legend}</div>
    </div>
    <div class="table-side">
      <div class="table-head">${title}</div>
      <table>
        <thead><tr><th>Valeur</th><th>Nb</th><th>%</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── Synthèse narrative ───────────────────────────────────────────
function buildSynthese(records) {
  const total     = records.length;
  const fav       = records.filter(r => /favor/i.test(v(r,'Etat_demande'))).length;
  const def       = records.filter(r => /refus|défav|defav/i.test(v(r,'Etat_demande'))).length;
  const hdl       = records.filter(r => isOui(v(r,'Hors_delai_PC'))).length;
  const deroga    = records.filter(r => isOui(v(r,'Derogatoire'))).length;
  const alertes   = records.filter(r => v(r,'Alerte') !== '').length;
  const motifs    = countBy(records,'Motif_CAES').slice(0,3);
  const domaines  = countBy(records,'Domaine').slice(0,2);
  const formations= countBy(records,'Formation').slice(0,2);

  const motifsTxt    = motifs.map(([k,n])=>`<strong>${k}</strong> (${n})`).join(', ');
  const domainesTxt  = domaines.map(([k,n])=>`<strong>${k}</strong> (${n})`).join(' et ');
  const formationsTxt= formations.map(([k,n])=>`<strong>${k}</strong> (${n})`).join(' et ');

  return `<div class="card">
    <div class="card-head">📋 Synthèse de la situation</div>
    <div class="card-body">
      <h4>Volume et nature des demandes</h4>
      <p>La commission a reçu <strong>${total} dossiers</strong> au total.
      Parmi eux, <strong>${deroga} sont dérogatoires</strong> (${pct(deroga,total)}%)
      et <strong>${hdl} sont hors délai Parcoursup</strong> (${pct(hdl,total)}%).
      ${alertes > 0
        ? `<strong>${alertes} dossier${alertes>1?'s':''} présentent une alerte</strong> nécessitant une attention particulière.`
        : "Aucune alerte particulière n'est signalée."}</p>

      <h4>Motifs dominants</h4>
      <p>Les trois motifs les plus fréquents sont : ${motifsTxt},
      représentant ${pct(motifs.reduce((s,[,n])=>s+n,0),total)}% des demandes.</p>

      <h4>État de traitement</h4>
      <p><strong>${fav} dossiers sont favorables</strong> (${pct(fav,total)}%),
      <strong>${def} défavorables</strong> (${pct(def,total)}%).
      Les dossiers restants sont en attente ou en cours d'instruction.</p>

      <h4>Formations et domaines sollicités</h4>
      <p>Domaines les plus représentés : ${domainesTxt}.
      Formations les plus demandées : ${formationsTxt}.</p>

      <h4>Points de vigilance</h4>
      <ul>
        ${hdl > 0 ? `<li>${hdl} dossier${hdl>1?'s':''} hors délai PC (${pct(hdl,total)}%) — à traiter en priorité.</li>` : ''}
        ${deroga > 0 ? `<li>${deroga} dossier${deroga>1?'s':''} dérogatoires nécessitant un examen individualisé.</li>` : ''}
        ${alertes > 0 ? `<li>${alertes} alerte${alertes>1?'s':''} signalée${alertes>1?'s':''} à lever avant la commission.</li>` : ''}
        <li>Vérifier la cohérence entre formation demandée et domaine pour les dossiers incomplets.</li>
      </ul>
    </div>
  </div>`;
}

// ── Scénarios prospectifs ─────────────────────────────────────────
function buildScenarios(records) {
  const total  = records.length;
  const hdl    = records.filter(r => isOui(v(r,'Hors_delai_PC'))).length;
  const deroga = records.filter(r => isOui(v(r,'Derogatoire'))).length;
  const fav    = records.filter(r => /favor/i.test(v(r,'Etat_demande'))).length;
  const motifs = countBy(records,'Motif_CAES').slice(0,2).map(([k])=>k);
  const pHdl   = pct(hdl,total);
  const pFav   = pct(fav,total);

  return `<div class="scenarios-grid">
    <div class="scenario-card">
      <div class="sc-head" style="background:var(--vert)">Scénario 1 — Traitement accéléré</div>
      <div class="sc-body">
        <h5>Hypothèse</h5>
        <p>Priorisation des ${hdl} dossiers hors délai (${pHdl}%) et des ${deroga} dérogatoires.</p>
        <h5>Impact</h5>
        <p>Taux de traitement dans les délais porté à 95%+. Réduction du risque contentieux.</p>
        <h5>Actions</h5>
        <ul>
          <li>Session dédiée aux dossiers hors délai</li>
          <li>Binôme instructeur pour les cas dérogatoires</li>
          <li>Relance des lycées concernés sous 48h</li>
        </ul>
        <h5>Indicateur cible</h5>
        <p>0 dossier hors délai non traité avant la commission.</p>
      </div>
    </div>

    <div class="scenario-card">
      <div class="sc-head" style="background:var(--orange)">Scénario 2 — Harmonisation doctrinale</div>
      <div class="sc-body">
        <h5>Hypothèse</h5>
        <p>Les motifs <strong>${motifs[0]||'principaux'}</strong> et <strong>${motifs[1]||'secondaires'}</strong> concentrent les décisions.</p>
        <h5>Impact</h5>
        <p>Cohérence des avis renforcée. Gain de temps estimé : 20% sur les instructions répétitives.</p>
        <h5>Actions</h5>
        <ul>
          <li>Grille d'instruction commune pour les motifs récurrents</li>
          <li>Référentiel de décision partagé entre instructeurs</li>
          <li>Point hebdomadaire sur les cas limites</li>
        </ul>
        <h5>Indicateur cible</h5>
        <p>Cohérence des avis ≥ 90% sur les motifs dominants.</p>
      </div>
    </div>

    <div class="scenario-card">
      <div class="sc-head" style="background:var(--rouge)">Scénario 3 — Afflux supplémentaire</div>
      <div class="sc-body">
        <h5>Hypothèse</h5>
        <p>Volume de dossiers en hausse de 30%. Capacité de traitement actuelle à ses limites.</p>
        <h5>Impact</h5>
        <p>Risque de dépassement réglementaire. Taux favorable actuel (${pFav}%) difficile à maintenir.</p>
        <h5>Actions</h5>
        <ul>
          <li>Anticipation des ressources supplémentaires</li>
          <li>Circuit simplifié pour les dossiers non dérogatoires</li>
          <li>Communication préventive aux établissements</li>
        </ul>
        <h5>Indicateur cible</h5>
        <p>Capacité ≥ ${Math.round(total*1.3)} dossiers sans dégradation de qualité.</p>
      </div>
    </div>
  </div>`;
}

// ── Rendu principal ───────────────────────────────────────────────
function render(records) {
  const total = records.length;
  const fav   = records.filter(r => /favor/i.test(v(r,'Etat_demande'))).length;
  const def   = records.filter(r => /refus|défav|defav/i.test(v(r,'Etat_demande'))).length;
  const hdl   = records.filter(r => isOui(v(r,'Hors_delai_PC'))).length;

  const app = document.getElementById('app');
  app.innerHTML = '';

  // KPIs
  app.innerHTML += `<div class="kpi-row">
    <div class="kpi bleu"><div class="val">${total}</div><div class="lbl">Dossiers total</div></div>
    <div class="kpi vert"><div class="val">${fav}</div><div class="lbl">Favorables</div></div>
    <div class="kpi rouge"><div class="val">${def}</div><div class="lbl">Défavorables</div></div>
    <div class="kpi orange"><div class="val">${hdl}</div><div class="lbl">Hors délai PC</div></div>
  </div>`;

  // Bloc 1 — États et dérogatoires
  app.innerHTML += `<div class="section-title">📊 Répartition des demandes</div>`;
  app.innerHTML += makeChartBlock('État des demandes',   countBy(records,'Etat_demande'),  total, 0);
  app.innerHTML += makeChartBlock('Motifs CAES',         countBy(records,'Motif_CAES'),    total, 2);
  app.innerHTML += makeChartBlock('Dérogatoire / Non',   countBy(records,'Derogatoire'),   total, 4);

  // Bloc 2 — Orientation
  app.innerHTML += `<div class="section-title">🎓 Orientation et formations</div>`;
  app.innerHTML += makeChartBlock('Par domaine',         countBy(records,'Domaine'),       total, 5);
  app.innerHTML += makeChartBlock('Par formation',       countBy(records,'Formation'),     total, 7);

  // Bloc 3 — Profils
  app.innerHTML += `<div class="section-title">🏫 Profils des candidats</div>`;
  app.innerHTML += makeChartBlock('Par lycée d\'origine', countBy(records,'Lycee'),        total, 9);
  app.innerHTML += makeChartBlock('Par série de Bac',    countBy(records,'Serie_Bac'),     total, 11);
  app.innerHTML += makeChartBlock('Par type de Bac',     countBy(records,'Type_Bac'),      total, 13);

  // Synthèse
  app.innerHTML += `<div class="section-title">📋 Analyse</div>`;
  app.innerHTML += buildSynthese(records);

  // Scénarios
  app.innerHTML += `<div class="section-title">🔭 Scénarios prospectifs</div>`;
  app.innerHTML += buildScenarios(records);
}
</script>
</body>
</html>
