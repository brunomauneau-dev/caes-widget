<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Quiz Parcoursup – La Roue des Savoirs</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1b2d;
    --surface: #162136;
    --card: #1e2f4a;
    --accent1: #f7c948;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --accent4: #a29bfe;
    --text: #e8f0fe;
    --text-dim: #8fa3c0;
    --correct: #43d98a;
    --wrong: #ff6b6b;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(78,205,196,0.08) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(247,201,72,0.06) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    text-align: center;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-dim);
    text-align: center;
    font-size: 0.95rem;
    margin-bottom: 24px;
  }

  /* ===== SCORE BAR ===== */
  .score-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
    background: var(--surface);
    padding: 10px 20px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  .score-pill {
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 1.1rem;
  }
  .score-pill span { color: var(--accent1); }
  .progress-dots { display: flex; gap: 6px; }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--card);
    border: 2px solid var(--text-dim);
    transition: all 0.3s;
  }
  .dot.done { background: var(--correct); border-color: var(--correct); }
  .dot.active { background: var(--accent1); border-color: var(--accent1); transform: scale(1.3); }

  /* ===== MAIN LAYOUT ===== */
  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 680px;
  }

  /* ===== WHEEL ===== */
  .wheel-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wheel-outer {
    position: relative;
    width: min(320px, 80vw);
    height: min(320px, 80vw);
  }

  .wheel-pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--accent1);
    z-index: 10;
    filter: drop-shadow(0 2px 6px rgba(247,201,72,0.6));
  }

  #wheelCanvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(78,205,196,0.2), 0 0 80px rgba(247,201,72,0.1);
    cursor: pointer;
    transition: transform 0.1s;
  }
  #wheelCanvas:hover { transform: scale(1.02); }

  .spin-btn {
    margin-top: 16px;
    padding: 12px 36px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent1), #f5a623);
    color: #0f1b2d;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(247,201,72,0.4);
    letter-spacing: 0.5px;
  }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(247,201,72,0.5); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== QUESTION CARD ===== */
  .question-card {
    width: 100%;
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    display: none;
    animation: slideUp 0.4s ease;
  }
  .question-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent3);
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 18px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--surface);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent3);
    background: rgba(78,205,196,0.1);
    transform: translateX(4px);
  }
  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(67,217,138,0.15);
    color: var(--correct);
  }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255,107,107,0.12);
    color: var(--wrong);
  }
  .option-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.95rem;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .feedback.show { display: flex; animation: fadeIn 0.3s ease; }
  .feedback.correct-fb { background: rgba(67,217,138,0.15); color: var(--correct); border: 1px solid rgba(67,217,138,0.3); }
  .feedback.wrong-fb { background: rgba(255,107,107,0.12); color: var(--wrong); border: 1px solid rgba(255,107,107,0.25); }

  .next-btn {
    margin-top: 14px;
    padding: 10px 28px;
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
    background: var(--accent4);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .next-btn.show { display: inline-block; animation: fadeIn 0.3s ease; }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  /* ===== END SCREEN ===== */
  .end-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    padding: 32px 20px;
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.5s ease;
  }
  .end-screen.show { display: flex; }

  .trophy {
    font-size: 5rem;
    line-height: 1;
    filter: drop-shadow(0 4px 16px rgba(247,201,72,0.5));
  }

  .end-title {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .end-score {
    font-size: 3.5rem;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    color: var(--accent1);
  }

  .end-msg {
    color: var(--text-dim);
    font-size: 1rem;
    max-width: 360px;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 14px 40px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent3), #3ab5ad);
    color: #0f1b2d;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(78,205,196,0.35);
    margin-top: 8px;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(78,205,196,0.5); }

  /* ===== INSTRUCTION ===== */
  .instruction {
    color: var(--text-dim);
    font-size: 0.88rem;
    text-align: center;
    margin-top: 4px;
  }

  /* ===== WHEEL LABEL INDICATOR ===== */
  .current-q-label {
    background: var(--surface);
    border: 1px solid rgba(247,201,72,0.3);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent1);
    margin-top: 8px;
    display: none;
  }
  .current-q-label.show { display: block; }
</style>
</head>
<body>

<h1>🎡 La Roue Parcoursup</h1>
<p class="subtitle">Tourne la roue, réponds aux questions et teste tes connaissances !</p>

<div class="score-bar">
  <div class="score-pill">Score : <span id="scoreDisplay">0</span> / 6</div>
  <div class="progress-dots" id="progressDots"></div>
</div>

<div class="game-container" id="gameArea">

  <!-- WHEEL -->
  <div class="wheel-wrapper">
    <div class="wheel-outer">
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="320" height="320"></canvas>
    </div>
    <div class="current-q-label" id="currentQLabel">❓ Question en cours</div>
    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎲 Tourner la roue !</button>
    <p class="instruction" id="instrText">Clique pour faire tourner la roue et découvrir une question</p>
  </div>

  <!-- QUESTION CARD -->
  <div class="question-card" id="questionCard">
    <div class="q-number" id="qNumber">Question 1</div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback" id="feedbackBox">
      <span id="feedbackIcon"></span>
      <span id="feedbackText"></span>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextRound()">Suivant ➜</button>
  </div>

</div>

<!-- END SCREEN -->
<div class="end-screen" id="endScreen">
  <div class="trophy" id="trophyIcon">🏆</div>
  <div class="end-title">Quiz terminé !</div>
  <div class="end-score" id="finalScore">0 / 6</div>
  <div class="end-msg" id="endMsg"></div>
  <button class="restart-btn" onclick="restartGame()">🔄 Recommencer</button>
</div>

<script>
const questions = [
  {
    text: "Qui peut formuler des vœux sur Parcoursup ?",
    options: [
      "Tous les lycéens",
      "Les candidats en réorientation",
      "Uniquement les élèves de terminale",
      "Les élèves de terminale",
      "Les candidats titulaires ou en préparation du baccalauréat ou son équivalent (DEAU)"
    ],
    correct: 4, // index de la bonne réponse (0-based)
    feedback: "Tous les candidats titulaires ou en préparation du baccalauréat (ou équivalent comme le DAEU) peuvent formuler des vœux sur Parcoursup."
  },
  {
    text: "Faut-il avoir un dossier Parcoursup pour consulter les formations disponibles sur la plateforme ?",
    options: ["Oui", "Non"],
    correct: 1,
    feedback: "Non ! Consulter les formations sur Parcoursup est libre et ne nécessite aucun compte."
  },
  {
    text: "Qui analyse les candidatures sur Parcoursup ?",
    options: [
      "L'algorithme",
      "La commission d'examen des vœux de la formation",
      "L'équipe Parcoursup"
    ],
    correct: 1,
    feedback: "C'est la commission d'examen des vœux propre à chaque formation qui analyse les dossiers, pas un algorithme seul."
  },
  {
    text: "Les candidats sans affectation sont-ils mis de côté ?",
    options: [
      "Les candidats peuvent participer à la phase complémentaire pour formuler de nouveaux vœux",
      "Ils doivent retenter leur chance l'an prochain",
      "Ils peuvent solliciter la CAES (commissions d'accès à l'enseignement supérieur) pour trouver une solution adaptée"
    ],
    correct: [0, 2],
    feedback: "Deux solutions existent : la phase complémentaire pour formuler de nouveaux vœux, et la CAES qui accompagne les candidats sans affectation."
  },
  {
    text: "Si les candidats formulent des vœux sur la plateforme, peuvent-ils candidater à des formations hors Parcoursup ou à l'étranger ?",
    options: [
      "Oui, les candidats peuvent à la fois formuler des vœux sur Parcoursup ET candidater pour des formations hors Parcoursup ou à l'étranger",
      "Non, si les candidats participent à Parcoursup, ils ne peuvent pas présenter d'autres candidatures"
    ],
    correct: 0,
    feedback: "Parcoursup n'empêche pas de candidater en parallèle à des formations hors plateforme ou à l'étranger !"
  },
  {
    text: "Si ma première année d'études supérieures ne me convient pas, est-ce que je pourrais reformuler des vœux la session suivante ?",
    options: [
      "Oui, je peux recandidater sur la plateforme tant que j'ai le baccalauréat",
      "Non, je n'ai qu'une seule chance"
    ],
    correct: 0,
    feedback: "Oui ! Tant que tu es titulaire du baccalauréat, tu peux revenir sur Parcoursup à chaque nouvelle session pour te réorienter."
  }
];

// Wheel colors per question
const segColors = [
  "#f7c948", "#4ecdc4", "#ff6b6b", "#a29bfe", "#fd79a8", "#00b894"
];
const segLabels = ["Q1", "Q2", "Q3", "Q4", "Q5", "Q6"];

let score = 0;
let answeredQuestions = new Set();
let currentQuestionIndex = -1;
let isSpinning = false;
let rotation = 0;
let answered = false;

const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");
const size = canvas.width;
const cx = size / 2, cy = size / 2, r = size / 2 - 8;
const numSeg = questions.length;
const segAngle = (2 * Math.PI) / numSeg;

function drawWheel(rot) {
  ctx.clearRect(0, 0, size, size);
  // outer glow ring
  ctx.beginPath();
  ctx.arc(cx, cy, r + 6, 0, 2 * Math.PI);
  ctx.strokeStyle = "rgba(255,255,255,0.07)";
  ctx.lineWidth = 12;
  ctx.stroke();

  for (let i = 0; i < numSeg; i++) {
    const start = rot + i * segAngle - Math.PI / 2;
    const end = start + segAngle;
    const done = answeredQuestions.has(i);

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = done ? "#2a3a52" : segColors[i];
    ctx.fill();
    ctx.strokeStyle = "#0f1b2d";
    ctx.lineWidth = 3;
    ctx.stroke();

    // label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + segAngle / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = done ? "#4a5f7a" : "#0f1b2d";
    ctx.font = `bold ${size * 0.065}px 'Baloo 2', cursive`;
    ctx.fillText(segLabels[i], r - 18, 6);
    ctx.restore();
  }

  // center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  ctx.fillStyle = "#0f1b2d";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = "#e8f0fe";
  ctx.font = `bold ${size * 0.06}px 'Baloo 2', cursive`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("GO", cx, cy);
}

function getIndexFromAngle(rot) {
  // pointer is at top (−π/2 offset)
  let a = ((-rot % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  let idx = Math.floor(a / segAngle);
  return (numSeg - idx) % numSeg;
}

function spinWheel() {
  if (isSpinning || answeredQuestions.size >= numSeg) return;

  // Find unanswered questions
  const unanswered = [];
  for (let i = 0; i < numSeg; i++) {
    if (!answeredQuestions.has(i)) unanswered.push(i);
  }
  if (unanswered.length === 0) return;

  // Pick random unanswered
  const target = unanswered[Math.floor(Math.random() * unanswered.length)];

  isSpinning = true;
  document.getElementById("spinBtn").disabled = true;
  document.getElementById("questionCard").classList.remove("visible");
  document.getElementById("currentQLabel").classList.remove("show");

  const startRot = rotation;

  // The pointer is at the top (12 o'clock).
  // Segment i starts at angle: startAngle = rot + i * segAngle - PI/2
  // We want the pointer (top = angle 0 in canvas coords, i.e. -PI/2 in our system)
  // to point at the CENTER of segment `target`.
  // Center of segment target in wheel coords = target * segAngle + segAngle/2
  // For pointer at top, we need: rot + target * segAngle + segAngle/2 - PI/2 = -PI/2 (mod 2PI)
  // => rot = -(target * segAngle + segAngle/2) (mod 2PI)
  // So the final rotation (mod 2PI) must equal:
  const targetAngleInWheel = target * segAngle + segAngle / 2;
  const desiredRotMod = (-(targetAngleInWheel) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);

  // Current rotation mod 2PI
  const currentRotMod = ((startRot % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

  // How much to add to go from currentRotMod to desiredRotMod (always positive, at least a little)
  let delta = (desiredRotMod - currentRotMod + 2 * Math.PI) % (2 * Math.PI);
  if (delta < 0.01) delta += 2 * Math.PI; // ensure at least one full step

  // Add several full spins for effect
  const fullSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const endRot = startRot + fullSpins + delta;

  const duration = 3200 + Math.random() * 800;
  const startTime = performance.now();

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    rotation = startRot + (endRot - startRot) * easeOut(t);
    drawWheel(rotation);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      rotation = endRot;
      isSpinning = false;
      currentQuestionIndex = target;
      showQuestion(target);
    }
  }

  requestAnimationFrame(animate);
}

let selectedAnswers = new Set(); // pour les questions multi-choix

function showQuestion(idx) {
  const q = questions[idx];
  const isMulti = Array.isArray(q.correct) && q.correct.length > 1;

  document.getElementById("qNumber").textContent = `Question ${idx + 1}`;
  document.getElementById("qText").textContent = q.text;

  // Indication multi-choix
  let hint = document.getElementById("multiHint");
  if (!hint) {
    hint = document.createElement("div");
    hint.id = "multiHint";
    hint.style.cssText = "font-size:0.82rem;color:var(--accent1);font-weight:700;margin-bottom:8px;";
    document.getElementById("optionsContainer").before(hint);
  }
  hint.textContent = isMulti ? `⚠️ ${q.correct.length} bonnes réponses à sélectionner` : "";

  selectedAnswers = new Set();
  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt;
    btn.onclick = () => isMulti ? toggleMultiAnswer(i, idx) : checkAnswer(i, idx);
    container.appendChild(btn);
  });

  // Bouton valider pour multi-choix
  let validateBtn = document.getElementById("validateBtn");
  if (!validateBtn) {
    validateBtn = document.createElement("button");
    validateBtn.id = "validateBtn";
    validateBtn.className = "next-btn";
    validateBtn.textContent = "✔️ Valider mes réponses";
    validateBtn.style.marginTop = "12px";
    document.getElementById("nextBtn").before(validateBtn);
  }
  // Toujours mettre à jour le onclick avec le bon idx
  validateBtn.onclick = () => submitMultiAnswer(idx);
  validateBtn.className = isMulti ? "next-btn show" : "next-btn";
  validateBtn.disabled = true;
  validateBtn.style.opacity = "0.4";

  document.getElementById("feedbackBox").className = "feedback";
  document.getElementById("nextBtn").className = "next-btn";
  document.getElementById("questionCard").classList.add("visible");

  const label = document.getElementById("currentQLabel");
  label.textContent = `❓ Question ${idx + 1} sélectionnée`;
  label.classList.add("show");

  document.getElementById("instrText").textContent = "Réponds à la question ci-dessous !";
  answered = false;
}

function toggleMultiAnswer(selected, qIdx) {
  if (answered) return;
  const q = questions[qIdx];
  const correctAnswers = Array.isArray(q.correct) ? q.correct : [q.correct];
  const btns = document.querySelectorAll(".option-btn");

  if (selectedAnswers.has(selected)) {
    selectedAnswers.delete(selected);
    btns[selected].classList.remove("selected-multi");
    btns[selected].style.borderColor = "";
    btns[selected].style.background = "";
  } else {
    selectedAnswers.add(selected);
    btns[selected].style.borderColor = "var(--accent4)";
    btns[selected].style.background = "rgba(162,155,254,0.15)";
  }

  // Activer le bouton valider seulement quand le bon nombre est sélectionné
  const validateBtn = document.getElementById("validateBtn");
  if (selectedAnswers.size === correctAnswers.length) {
    validateBtn.disabled = false;
    validateBtn.style.opacity = "1";
  } else {
    validateBtn.disabled = true;
    validateBtn.style.opacity = "0.4";
  }
}

function submitMultiAnswer(qIdx) {
  if (answered) return;
  answered = true;

  const q = questions[qIdx];
  const correctAnswers = Array.isArray(q.correct) ? q.correct : [q.correct];
  const btns = document.querySelectorAll(".option-btn");
  btns.forEach(b => { b.disabled = true; b.style.borderColor = ""; b.style.background = ""; });

  document.getElementById("validateBtn").className = "next-btn"; // cacher

  // Vérifier si toutes les bonnes réponses sont sélectionnées
  const isCorrect = correctAnswers.every(c => selectedAnswers.has(c)) && selectedAnswers.size === correctAnswers.length;

  // Mauvaises sélections en rouge d'abord
  selectedAnswers.forEach(si => {
    if (!correctAnswers.includes(si)) btns[si].classList.add("wrong");
  });
  // Bonnes réponses toujours en vert (en dernier pour avoir la priorité)
  correctAnswers.forEach(ci => btns[ci].classList.add("correct"));

  if (isCorrect) {
    score++;
    document.getElementById("scoreDisplay").textContent = score;
    showFeedback(true, "✅ Bonne réponse ! " + q.feedback);
  } else {
    showFeedback(false, "❌ " + q.feedback);
  }

  answeredQuestions.add(qIdx);
  updateDots();
  drawWheel(rotation);
  document.getElementById("nextBtn").className = "next-btn show";
}

function checkAnswer(selected, qIdx) {
  if (answered) return;
  answered = true;

  const q = questions[qIdx];
  const btns = document.querySelectorAll(".option-btn");
  btns.forEach(b => b.disabled = true);

  const correctAnswers = Array.isArray(q.correct) ? q.correct : [q.correct];
  const isCorrect = correctAnswers.includes(selected);

  correctAnswers.forEach(ci => btns[ci].classList.add("correct"));
  if (!isCorrect) btns[selected].classList.add("wrong");

  if (isCorrect) {
    score++;
    document.getElementById("scoreDisplay").textContent = score;
    showFeedback(true, "✅ Bonne réponse ! " + q.feedback);
  } else {
    showFeedback(false, "❌ " + q.feedback);
  }

  answeredQuestions.add(qIdx);
  updateDots();
  drawWheel(rotation);
  document.getElementById("nextBtn").className = "next-btn show";
}

function showFeedback(correct, msg) {
  const box = document.getElementById("feedbackBox");
  box.className = "feedback show " + (correct ? "correct-fb" : "wrong-fb");
  document.getElementById("feedbackText").textContent = msg;
}

function nextRound() {
  document.getElementById("questionCard").classList.remove("visible");
  document.getElementById("currentQLabel").classList.remove("show");

  if (answeredQuestions.size >= numSeg) {
    showEndScreen();
    return;
  }

  document.getElementById("spinBtn").disabled = false;
  document.getElementById("instrText").textContent = "Tourne la roue pour la prochaine question !";
}

function updateDots() {
  const dots = document.querySelectorAll(".dot");
  dots.forEach((d, i) => {
    d.classList.remove("done", "active");
    if (answeredQuestions.has(i)) d.classList.add("done");
    else if (i === currentQuestionIndex) d.classList.add("active");
  });
}

function showEndScreen() {
  document.getElementById("gameArea").style.display = "none";
  const end = document.getElementById("endScreen");
  end.classList.add("show");
  document.getElementById("finalScore").textContent = `${score} / 6`;

  let trophy, msg;
  if (score === 6) {
    trophy = "🏆"; msg = "Parfait ! Tu maîtrises Parcoursup sur le bout des doigts. Tu es prêt(e) pour la procédure !";
  } else if (score >= 4) {
    trophy = "🥇"; msg = "Très bien ! Tu as de solides connaissances sur Parcoursup. Quelques révisions et tu seras au top !";
  } else if (score >= 2) {
    trophy = "📚"; msg = "Pas mal, mais quelques points méritent d'être revus. N'hésite pas à explorer le site Parcoursup.fr !";
  } else {
    trophy = "💪"; msg = "Il faut encore réviser ! Retente ta chance et consulte les ressources officielles sur parcoursup.fr.";
  }
  document.getElementById("trophyIcon").textContent = trophy;
  document.getElementById("endMsg").textContent = msg;
}

function restartGame() {
  score = 0;
  answeredQuestions = new Set();
  currentQuestionIndex = -1;
  rotation = 0;
  answered = false;

  document.getElementById("scoreDisplay").textContent = "0";
  document.getElementById("endScreen").classList.remove("show");
  document.getElementById("gameArea").style.display = "flex";
  document.getElementById("questionCard").classList.remove("visible");
  document.getElementById("currentQLabel").classList.remove("show");
  document.getElementById("spinBtn").disabled = false;
  document.getElementById("instrText").textContent = "Clique pour faire tourner la roue et découvrir une question";

  updateDots();
  drawWheel(0);
}

// Init progress dots
function initDots() {
  const container = document.getElementById("progressDots");
  for (let i = 0; i < numSeg; i++) {
    const d = document.createElement("div");
    d.className = "dot";
    container.appendChild(d);
  }
}

initDots();
drawWheel(0);
</script>
</body>
</html>
